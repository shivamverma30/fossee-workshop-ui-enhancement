{% extends "workshop_app/base.html" %}

{% block title %} Password Changed {% endblock %}

{% block content %}
<section class="auth-shell auth-shell-compact" aria-labelledby="password-change-done-title">
    <article class="card auth-card auth-status-card">
        <div class="card-body auth-card-body">
            <div class="auth-status-icon auth-status-icon-success" aria-hidden="true">
                <span class="material-icons">verified_user</span>
            </div>

            <div class="auth-heading-wrap auth-heading-wrap-center">
                <h1 id="password-change-done-title" class="auth-title">Password changed</h1>
                <p class="auth-subtitle">Your password has been changed successfully. Redirecting to your dashboard...</p>
            </div>

            <div class="auth-actions auth-actions-center" role="group" aria-label="Password change completion actions">
                <a href="{% url 'workshop_app:index' %}" class="btn btn-primary auth-btn-primary">Go Now</a>
            </div>
        </div>
    </article>
</section>
<script type="text/javascript">
    window.setTimeout(function()
    {
        location.href="{% url 'workshop_app:index' %}"
    }, 2000);
</script>
{% endblock %}
