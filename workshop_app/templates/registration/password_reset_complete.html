{% extends "workshop_app/base.html" %}

{% block title %} Password Reset Complete {% endblock %}

{% block content %}
<section class="auth-shell auth-shell-compact" aria-labelledby="password-reset-complete-title">
    <article class="card auth-card auth-status-card">
        <div class="card-body auth-card-body">
            <div class="auth-status-icon auth-status-icon-success" aria-hidden="true">
                <span class="material-icons">check_circle</span>
            </div>

            <div class="auth-heading-wrap auth-heading-wrap-center">
                <h1 id="password-reset-complete-title" class="auth-title">Password updated successfully</h1>
                <p class="auth-subtitle">Your password has been reset. You can now sign in with your new password.</p>
            </div>

            <div class="auth-actions auth-actions-center" role="group" aria-label="Password reset completion actions">
                <a href="{% url 'workshop_app:login' %}" class="btn btn-primary auth-btn-primary">Log In</a>
            </div>
        </div>
    </article>
</section>
{% endblock %}
