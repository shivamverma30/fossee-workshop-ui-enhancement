{% extends "workshop_app/base.html" %}
{% block title %} Reset Email Sent {% endblock %}


{% block content %}
<section class="auth-shell auth-shell-compact" aria-labelledby="password-reset-done-title">
	<article class="card auth-card auth-status-card">
		<div class="card-body auth-card-body">
			<div class="auth-status-icon auth-status-icon-success" aria-hidden="true">
				<span class="material-icons">mark_email_read</span>
			</div>

			<div class="auth-heading-wrap auth-heading-wrap-center">
				<h1 id="password-reset-done-title" class="auth-title">Check your email</h1>
				<p class="auth-subtitle">Password reset instructions have been sent to your registered email address.</p>
			</div>

			<div class="auth-actions auth-actions-center" role="group" aria-label="Post reset actions">
				<a class="btn btn-primary auth-btn-primary" href="{% url 'workshop_app:login' %}">Go to Login</a>
			</div>
		</div>
	</article>
</section>
{% endblock %}
