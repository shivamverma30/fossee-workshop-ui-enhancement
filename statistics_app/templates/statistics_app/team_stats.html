{% extends 'workshop_app/base.html' %}

{% block title %}
 Workshop  Statistics
{% endblock %}

{% block content %}
<section class="utility-page team-stats-page" aria-labelledby="team-stats-title">
    <header class="utility-page-header">
        <h1 id="team-stats-title" class="utility-title">Team Statistics</h1>
        <p class="utility-subtitle">Compare workshop counts across members for the selected team.</p>
    </header>

    <div class="team-stats-layout">
        <aside class="card team-nav-card" aria-label="Team selector">
            <h2 class="team-nav-title">Teams</h2>
            <ul class="team-nav-list">
                {% for team in all_teams %}
                    <li>
                        <a href="{% url 'statistics_app:team' team.id %}" class="team-nav-link{% if team.id == team_id %} active{% endif %}">
                            Team {{ forloop.counter }}
                        </a>
                    </li>
                {% endfor %}
            </ul>
        </aside>

        <section class="card team-chart-card" aria-label="Team chart panel">
            <div class="team-chart-wrap">
                <canvas id="myChart" aria-label="Team members workshop count chart"></canvas>
            </div>
        </section>
    </div>
</section>
<script>
    var ctx = document.getElementById('myChart').getContext('2d');
    var chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: {{team_labels|safe}},
            datasets: [{
                data: {{ws_count|safe}},
                label: "Team Members Workshops",
                backgroundColor: 'rgb(255, 99, 132)',
                borderColor: 'rgb(255, 99, 132)',
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            legend: {
                display: true
            },
            scales: {
                yAxes: [{
                    ticks: {
                        beginAtZero: true,
                        precision: 0
                    }
                }]
            }
        }
    });
</script>
{% endblock %}
